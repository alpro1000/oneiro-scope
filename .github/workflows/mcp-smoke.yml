name: MCP Smoke

on:
  push:
    paths:
      - 'backend/mcp/**'
      - 'backend/services/**'
      - 'agents/**'
      - 'backend/tests/test_mcp_smoke.py'
      - 'backend/tests/test_agent_smoke.py'
      - 'backend/requirements.txt'
      - '.github/workflows/mcp-smoke.yml'
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-mcp-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-mcp-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --ignore-installed PyJWT
          pip install -r backend/requirements.txt

      - name: Run MCP + agent smoke tests
        run: |
          python -m pytest backend/tests/test_mcp_smoke.py backend/tests/test_agent_smoke.py -v
