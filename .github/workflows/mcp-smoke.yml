name: MCP Smoke

on:
  push:
    paths:
      - 'backend/mcp/**'
      - 'backend/services/**'
      - 'agents/**'
      - 'backend/tests/test_mcp_smoke.py'
      - 'backend/tests/test_agent_smoke.py'
      - 'backend/requirements.txt'
      - '.github/workflows/mcp-smoke.yml'
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-mcp-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-mcp-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what the smoke tests need — full backend requirements
          # bring heavy deps (mne, pandas, openai-whisper, sentry, etc.) that
          # aren't required for MCP/agent imports or pure-tool tests, and
          # slow CI install dramatically.
          pip install \
            "mcp[cli]>=1.2" \
            "claude-agent-sdk>=0.2" \
            "pydantic>=2.7,<3" \
            "pydantic-settings>=2.1" \
            pyswisseph \
            geopy \
            timezonefinder \
            pytz \
            ephem \
            fastapi \
            "pytest>=7" \
            "pytest-asyncio>=0.23"

      - name: Run MCP + agent smoke tests
        run: |
          python -m pytest \
            backend/tests/test_mcp_smoke.py \
            backend/tests/test_agent_smoke.py \
            backend/tests/test_cost_tracker.py \
            backend/tests/test_llm_providers_cloud.py \
            -v
